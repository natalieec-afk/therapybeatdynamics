<!DOCTYPE html>
<html lang="en" data-theme="light"><script>
  (function(){
    var saved = localStorage.getItem('tbd-theme');
    var prefer = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = saved || (prefer ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<head>
<meta charset="UTF-8">
<title>Therapy Beat Dynamics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700;900&family=Roboto+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root[data-theme="light"] {
    --bg:         #faf8f5;
    --bg2:        #f0ece4;
    --panel:      #ffffff;
    --border:     #e8dfd0;
    --border2:    #d4c9b5;
    --accent:     #4682B4;
    --teal:       #5bc4cc;
    --warn:       #e85d75;
    --text:       #3a3530;
    --text2:      #6b6259;
    --dim:        #a89e92;
    --canvas-bg:  #fffef9;
    --grid-line:  rgba(180,160,130,0.12);
    --shadow:     rgba(90,70,50,0.08);
    --shadow2:    rgba(90,70,50,0.18);
    --thumb-bg:   #ffffff;
    --hover-bg:   rgba(0,0,0,0.06);
    --active-bg:  rgba(0,0,0,0.10);
    --tt-bg:      #2a2520;
    --tt-fg:      #ffffff;
    --overlay-bg: rgba(255,255,255,0.88);
    --note-filter: invert(67%) sepia(62%) saturate(600%) hue-rotate(1deg) brightness(105%);
  }

  :root[data-theme="dark"] {
    --bg:         #1a2420;
    --bg2:        #1f2e28;
    --panel:      #1f2e28;
    --border:     #2e4038;
    --border2:    #3a5248;
    --accent:     #a8e6cf;
    --teal:       #88d8b0;
    --warn:       #f06080;
    --text:       #e8f5ee;
    --text2:      #8bbfa0;
    --dim:        #4a7060;
    --canvas-bg:  #111111;
    --grid-line:  rgba(120,200,150,0.10);
    --shadow:     rgba(0,0,0,0.4);
    --shadow2:    rgba(0,0,0,0.6);
    --thumb-bg:   #1f2e28;
    --hover-bg:   rgba(255,255,255,0.07);
    --active-bg:  rgba(168,230,207,0.15);
    --tt-bg:      #e8f5ee;
    --tt-fg:      #1a2420;
    --overlay-bg: rgba(20,38,30,0.90);
    --note-filter: invert(80%) sepia(30%) saturate(400%) hue-rotate(100deg) brightness(110%);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: background 0.3s, color 0.3s;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: absolute;
    top: 18px; left: 18px; right: 18px;
    display: flex; align-items: center; gap: 10px;
    padding: 0 20px; height: 72px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.58), rgba(255,255,255,0.28)),
      linear-gradient(135deg, rgba(255,255,255,0.42), rgba(255,255,255,0.10));
    border: 1px solid rgba(255,255,255,0.64);
    border-radius: 28px; flex-shrink: 0;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.95) inset,
      0 -1px 0 rgba(255,255,255,0.28) inset,
      0 18px 40px rgba(146,175,220,0.14),
      0 8px 18px rgba(90,70,50,0.08);
    backdrop-filter: blur(34px) saturate(170%);
    -webkit-backdrop-filter: blur(34px) saturate(170%);
    z-index: 20; overflow: visible;
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }
  #topbar::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 18% 0%, rgba(255,255,255,0.82), rgba(255,255,255,0.18) 30%, transparent 58%),
      radial-gradient(circle at 85% 120%, rgba(175,214,255,0.12), transparent 38%),
      linear-gradient(90deg, rgba(255,255,255,0.22), transparent 26%, transparent 74%, rgba(255,255,255,0.12));
    pointer-events: none; opacity: 0.9; border-radius: 28px;
  }
  #topbar::after {
    content: ''; position: absolute; inset: 1px; border-radius: 27px;
    border: 1px solid rgba(255,255,255,0.22); pointer-events: none;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    padding: 1px; opacity: 0.65;
  }
  #topbar > * { position: relative; z-index: 1; }

  #topbar h1 {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 30px; font-weight: 700; letter-spacing: 0.02em;
    color: var(--text); white-space: nowrap; user-select: none;
  }
  #topbar h1 .accent { color: var(--accent); }

  .divider-v { width: 1px; height: 24px; background: rgba(255,255,255,0.45); flex-shrink: 0; margin: 0 2px; }
  .spacer { flex: 1; }

  /* ── ICON BUTTON ── */
  .icon-btn {
    background: none; border: none; cursor: pointer; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    padding: 7px; color: var(--text2);
    transition: background 0.13s, color 0.13s; position: relative; flex-shrink: 0;
  }
  .icon-btn:hover { background: var(--hover-bg); color: var(--text); }
  .icon-btn.active { background: var(--active-bg); color: var(--accent); }
  .icon-btn svg { display: block; }
  .icon-btn[data-tip]::after {
    content: attr(data-tip); position: absolute; left: 50%; top: calc(100% + 7px);
    transform: translateX(-50%); background: var(--tt-bg); color: var(--tt-fg);
    font-size: 9px; padding: 3px 8px; border-radius: 5px; white-space: nowrap;
    pointer-events: none; opacity: 0; transition: opacity 0.12s; z-index: 200;
  }
  .icon-btn[data-tip]:hover::after { opacity: 1; }
  .icon-btn.warn-btn:hover { background: color-mix(in srgb, var(--warn) 10%, transparent); color: var(--warn); }

  /* ── STATUS ── */
  #status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--warn); flex-shrink: 0; transition: background 0.3s; }
  #status-dot.connected { background: #6dd87a; }
  #status-text { font-size: 9px; color: var(--dim); letter-spacing: 0.04em; white-space: nowrap; }
  :root[data-theme="dark"] #status-text { color: rgba(232,245,238,0.78); }

  /* ── MODE BADGE ── */
  #mode-badge {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    border: 1px solid transparent;
    transition: background 0.3s, color 0.3s, border-color 0.3s;
    white-space: nowrap; flex-shrink: 0;
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.30);
    color: var(--dim);
  }
  #mode-badge.solo {
    background: color-mix(in srgb, var(--accent) 14%, rgba(255,255,255,0.12));
    border-color: color-mix(in srgb, var(--accent) 40%, rgba(255,255,255,0.20));
    color: var(--accent);
  }
  #mode-badge.duet {
    background: color-mix(in srgb, var(--teal) 14%, rgba(255,255,255,0.12));
    border-color: color-mix(in srgb, var(--teal) 40%, rgba(255,255,255,0.20));
    color: var(--teal);
  }
  #mode-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--dim); transition: background 0.3s;
    flex-shrink: 0;
  }
  #mode-badge.solo #mode-dot { background: var(--accent); }
  #mode-badge.duet #mode-dot { background: var(--teal); }
  :root[data-theme="dark"] #mode-badge {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.10);
  }

  /* ── PIANO NOTE KEY STRIP ── */
  #note-key-strip {
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 0 4px;
    flex-shrink: 0;
  }
  #note-key-strip .nk-label {
    font-size: 7px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--dim); margin-right: 4px; white-space: nowrap;
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700;
  }
  .piano-strip {
    position: relative;
    display: flex;
    align-items: flex-end;
    height: 44px;
    gap: 1.5px;
    padding: 0 2px;
  }
  .pk {
    position: relative;
    cursor: pointer;
    border-radius: 0 0 5px 5px;
    transition: transform 0.1s, box-shadow 0.1s, filter 0.15s;
    flex-shrink: 0;
  }
  .pk.white-key {
    width: 18px; height: 42px;
    border: 1.5px solid rgba(0,0,0,0.10);
    border-top: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.8) inset;
    z-index: 1;
  }
  .pk.black-key {
    width: 12px; height: 26px;
    margin: 0 -7px;
    border: 1px solid rgba(0,0,0,0.25);
    box-shadow: 0 2px 5px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.12) inset;
    z-index: 2;
    align-self: flex-start;
    margin-top: 2px;
  }
  .pk:hover { transform: translateY(1px); filter: brightness(1.08); }
  .pk.active-note {
    transform: translateY(2px) scale(1.05);
    box-shadow: 0 0 10px 3px rgba(255,255,255,0.5), 0 1px 0 rgba(255,255,255,0.8) inset;
    filter: brightness(1.15) saturate(1.2);
  }
  .pk[data-tip]::after {
    content: attr(data-tip); position: absolute; left: 50%; bottom: calc(100% + 6px);
    transform: translateX(-50%); background: var(--tt-bg); color: var(--tt-fg);
    font-size: 8px; padding: 2px 6px; border-radius: 4px; white-space: nowrap;
    pointer-events: none; opacity: 0; transition: opacity 0.12s; z-index: 300;
    font-family: 'Roboto Mono', monospace;
  }
  .pk[data-tip]:hover::after { opacity: 1; }

  /* ── MAIN ── */
  #main { display: flex; flex: 1; overflow: hidden; position: relative; }

  /* ── CANVAS ── */
  #canvas-wrap {
    flex: 1; position: relative; overflow: hidden;
    background: var(--canvas-bg); transition: background 0.3s; touch-action: none;
  }
  #canvas-wrap.pannable { cursor: grab; }
  #canvas-wrap.panning { cursor: grabbing; }
  #board-stage {
    position: relative;
    width: var(--board-width, 100%); height: var(--board-height, 100%);
    background: var(--canvas-bg);
    transform: translate(var(--board-pan-x, 0px), var(--board-pan-y, 0px)) scale(var(--board-scale, 1));
    transform-origin: top left; transition: background 0.3s;
  }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
  #board-stage::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 40px 40px; z-index: 1;
  }
  #board-stage.blackboard::before {
    background-image:
      linear-gradient(rgba(200,200,200,0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,200,200,0.12) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  #cursor-ring {
    position: absolute; pointer-events: none; border-radius: 50%;
    border: 1.5px solid rgba(100,100,100,0.4); transform: translate(-50%, -50%);
    transition: width 0.08s, height 0.08s; z-index: 2;
  }
  #canvas-zoom-controls {
    position: absolute; right: 18px; bottom: 18px; z-index: 16;
    display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.28);
    background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06)), rgba(0,0,0,0.12);
    box-shadow: 0 1px 0 rgba(255,255,255,0.20) inset, 0 4px 10px rgba(0,0,0,0.18);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .zoom-btn {
    width: 28px; height: 28px; border: 0; border-radius: 10px; background: transparent;
    color: var(--text); font-size: 20px; line-height: 1;
    display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.14s;
  }
  .zoom-btn:hover { background: var(--hover-bg); }
  #zoom-display { min-width: 48px; text-align: center; font-size: 11px; color: var(--text); letter-spacing: 0.04em; }
  :root[data-theme="dark"] #canvas-zoom-controls {
    border-color: rgba(255,255,255,0.12);
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)), rgba(0,0,0,0.22);
  }

  /* ── LEFT TOOLBAR ── */
  #left-toolbar {
    position: absolute; left: 14px; top: calc(50% - 60px); transform: translateY(-50%);
    z-index: 15; display: flex; flex-direction: column; gap: 1px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 8px 6px;
    box-shadow: 0 4px 20px var(--shadow2);
    transition: background 0.3s, border-color 0.3s, opacity 0.2s, transform 0.2s;
  }
  #left-toolbar.hidden { opacity: 0; pointer-events: none; transform: translateY(-50%) translateX(-8px); }

  #toolbar-reveal {
    position: absolute; left: 10px; top: calc(50% - 60px); transform: translateY(-50%);
    z-index: 15; background: var(--panel); border: 1px solid var(--border); border-radius: 9px;
    width: 22px; height: 42px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 2px 10px var(--shadow2); color: var(--dim);
    transition: background 0.15s, color 0.15s, opacity 0.2s; opacity: 0; pointer-events: none;
  }
  #toolbar-reveal.visible { opacity: 1; pointer-events: all; }
  #toolbar-reveal:hover { background: var(--hover-bg); color: var(--text); }

  /* ── START POINT PICKER ── */
  #start-overlay { position: absolute; inset: 0; z-index: 50; cursor: crosshair; background: transparent; }
  #start-overlay-hint {
    position: absolute; top: 50%; right: 40px; transform: translateY(-50%);
    background: var(--overlay-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border); border-radius: 16px; padding: 22px 32px;
    text-align: center; pointer-events: none; box-shadow: 0 8px 32px var(--shadow2);
    left: auto;
  }
  #start-overlay-hint h2 { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  #start-overlay-hint p { font-size: 11px; color: var(--dim); letter-spacing: 0.06em; }

  .toolbar-sep { width: 22px; height: 1px; background: var(--border); margin: 2px auto; border-radius: 2px; }

  .tb-btn {
    background: none; border: none; cursor: pointer; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    padding: 7px; color: var(--text2); transition: background 0.13s, color 0.13s;
    position: relative; width: 40px; height: 40px;
  }
  .tb-btn:hover { background: var(--hover-bg); color: var(--text); }
  .tb-btn.active { background: var(--active-bg); color: var(--accent); }
  .tb-btn svg { display: block; width: 18px; height: 18px; }
  .tb-btn.warn-btn:hover { background: color-mix(in srgb, var(--warn) 10%, transparent); color: var(--warn); }
  .tb-btn[data-tip]::after {
    content: attr(data-tip); position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%);
    background: var(--tt-bg); color: var(--tt-fg); font-family: 'Roboto Mono', monospace; font-size: 9.5px;
    padding: 4px 9px; border-radius: 6px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.13s; z-index: 100;
  }
  .tb-btn[data-tip]:hover::after { opacity: 1; }
  .toolbar-hidden-in-mouse { display: none; }
  .session-only-hidden { display: none; }

  /* ── BRUSH SIZE SLIDER IN TOOLBAR ── */
  .tb-size-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 6px 0; position: relative;
  }
  .tb-size-label {
    font-size: 7px; letter-spacing: 0.10em; text-transform: uppercase;
    color: var(--dim); font-family: 'Roboto Mono', monospace; white-space: nowrap;
  }
  .tb-size-val {
    font-size: 8px; color: var(--accent); font-weight: 600;
    font-family: 'Roboto Mono', monospace; min-width: 18px; text-align: center;
  }
  #toolbar-size-slider {
    -webkit-appearance: none;
    writing-mode: vertical-lr;
    direction: rtl;
    width: 4px;
    height: 64px;
    border-radius: 10px;
    background: var(--border2);
    outline: none;
    cursor: pointer;
  }
  #toolbar-size-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--thumb-bg);
    box-shadow: 0 1px 4px var(--shadow2); cursor: pointer; transition: transform 0.12s;
  }
  #toolbar-size-slider:hover::-webkit-slider-thumb { transform: scale(1.15); }

  @supports (-moz-appearance: none) {
    #toolbar-size-slider {
      writing-mode: vertical-lr;
      direction: rtl;
      -moz-appearance: slider-vertical;
    }
  }

  /* ── RIGHT SENSOR PANEL ── */
  #sensor-panel {
    position: absolute;
    top: 108px;
    right: 18px;
    z-index: 15;
    width: 220px;
    background: var(--overlay-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 16px 16px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 6px 24px var(--shadow2);
    transition: background 0.3s, border-color 0.3s, opacity 0.25s, transform 0.25s;
    user-select: none;
  }
  #sensor-panel.collapsed {
    opacity: 0;
    pointer-events: none;
    transform: translateX(12px);
  }

  /* Floating button to reopen sensors panel */
  #sensor-fab {
    position: absolute;
    top: 108px;
    right: 18px;
    z-index: 16;
    width: 42px; height: 42px;
    border-radius: 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    box-shadow: 0 4px 16px var(--shadow2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text2);
    transition: background 0.15s, color 0.15s, opacity 0.2s, transform 0.2s;
    opacity: 0; pointer-events: none;
  }
  #sensor-fab.visible {
    opacity: 1; pointer-events: all;
  }
  #sensor-fab:hover { background: var(--hover-bg); color: var(--text); }
  #sensor-fab[data-tip]::after {
    content: attr(data-tip); position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%);
    background: var(--tt-bg); color: var(--tt-fg); font-size: 9px; padding: 3px 8px; border-radius: 5px;
    white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.12s; z-index: 200;
  }
  #sensor-fab[data-tip]:hover::after { opacity: 1; }

  #sensor-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; cursor: grab;
  }
  #sensor-panel-header:active { cursor: grabbing; }

  .panel-label {
    font-size: 7.5px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--dim); margin-bottom: 8px; font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
  }
  .panel-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .sensor-close {
    background: none; border: none; cursor: pointer; color: var(--dim); border-radius: 6px; padding: 3px;
    transition: background 0.12s, color 0.12s; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .sensor-close:hover { background: var(--hover-bg); color: var(--text); }

  .axis-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .axis-label { font-size: 9.5px; color: var(--dim); }
  .axis-val { font-size: 9.5px; color: var(--text); font-weight: 500; }
  .axis-bar-bg { width: 100%; height: 4px; background: var(--bg2); border-radius: 10px; margin-bottom: 8px; overflow: hidden; position: relative; }
  .axis-bar-fill { height: 100%; border-radius: 10px; position: absolute; top: 0; transition: width 0.05s, left 0.05s; }

  #sens-val, #dead-val { font-size: 10px; color: var(--accent); font-weight: 500; }

  .overlay-section { margin-bottom: 12px; }
  .overlay-section:last-child { margin-bottom: 0; }
  #overlay-sens-slider, #overlay-dead-slider { width: 100%; margin-top: 4px; }

  /* ── MIC STATUS ── */
  #mic-status-row {
    display: flex; align-items: center; gap: 7px; margin-bottom: 8px;
  }
  #mic-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    background: var(--dim); transition: background 0.3s;
  }
  #mic-dot.active   { background: #6dd87a; }
  #mic-dot.silence  { background: var(--dim); }
  #mic-dot.calibrating { background: #f0a030; }

  #mic-note-display {
    font-size: 18px; font-weight: 700; letter-spacing: 0.04em;
    color: var(--text); line-height: 1; min-width: 28px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    transition: color 0.2s;
  }
  #mic-freq-display { font-size: 9px; color: var(--dim); flex: 1; text-align: right; }

  #mic-color-swatch {
    width: 100%; height: 8px; border-radius: 6px;
    background: var(--border); margin-bottom: 8px;
    transition: background 0.25s; border: 1px solid rgba(0,0,0,0.06);
  }

  body.erasing canvas { cursor: cell; }

  /* ── ANIMATED EIGHTH NOTE ── */
  @keyframes note-bounce {
    0%   { transform: rotate(-8deg) translateY(0px); }
    25%  { transform: rotate(4deg)  translateY(-4px); }
    50%  { transform: rotate(-6deg) translateY(-1px); }
    75%  { transform: rotate(5deg)  translateY(-5px); }
    100% { transform: rotate(-8deg) translateY(0px); }
  }
  @keyframes note-pulse {
    0%, 100% { opacity: 1; filter: drop-shadow(0 0 0px var(--accent)); }
    50%       { opacity: 0.85; filter: drop-shadow(0 0 6px var(--accent)); }
  }
  #note-icon-svg {
    animation: note-bounce 1.6s ease-in-out infinite, note-pulse 1.6s ease-in-out infinite;
    animation-play-state: paused; transform-origin: 14px 27px;
    transition: opacity 0.2s, transform 0.2s, filter 0.2s; opacity: 0.9; margin-right: 10px !important;
    filter:
      drop-shadow(0 2px 0 rgba(255,255,255,0.72))
      drop-shadow(0 5px 12px color-mix(in srgb, var(--accent) 34%, transparent));
    transform: scale(1.22);
  }
  body.painting #note-icon-svg {
    animation-play-state: running; opacity: 1;
    filter:
      drop-shadow(0 2px 0 rgba(255,255,255,0.82))
      drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 38%, transparent))
      drop-shadow(0 8px 18px color-mix(in srgb, var(--accent) 26%, transparent));
  }

  :root[data-theme="dark"] #topbar {
    background:
      linear-gradient(180deg, rgba(22,28,30,0.42), rgba(18,24,26,0.22)),
      linear-gradient(120deg, rgba(168,230,207,0.04), rgba(255,255,255,0.015));
    border-color: rgba(255,255,255,0.08);
    box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 18px 48px rgba(0,0,0,0.22), 0 4px 16px rgba(0,0,0,0.16);
  }
  :root[data-theme="dark"] #topbar::before {
    background:
      radial-gradient(circle at 18% 0%, rgba(255,255,255,0.16), rgba(255,255,255,0.04) 30%, transparent 58%),
      radial-gradient(circle at 85% 120%, rgba(168,230,207,0.05), transparent 38%),
      linear-gradient(90deg, rgba(255,255,255,0.06), transparent 26%, transparent 74%, rgba(255,255,255,0.03));
    opacity: 0.72;
  }
  :root[data-theme="dark"] #topbar::after { border-color: rgba(255,255,255,0.08); opacity: 0.28; }

  #topbar h1, #topbar #status-text, #topbar .slider-label { text-shadow: 0 1px 2px rgba(255,255,255,0.6); }
  :root[data-theme="dark"] #topbar h1,
  :root[data-theme="dark"] #topbar #status-text,
  :root[data-theme="dark"] #topbar .slider-label { text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

  /* ── BOTTOM SLIDER BAR ── */

  }
  #bottom-slider-stack { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  :root[data-theme="dark"] #bottom-sliders {
    background: rgba(13,17,23,0.4); border-top: 1px solid rgba(255,255,255,0.09);
    box-shadow: 0 -1px 0 rgba(255,255,255,0.06) inset;
  }
  .bottom-slider-group { display: flex; align-items: center; gap: 14px; padding: 5px 0 5px 28px; width: 100%; }
  .bottom-slider-label {
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim);
    font-family: 'Roboto Mono', monospace; display: flex; align-items: center; gap: 6px; white-space: nowrap; min-width: 130px;
  }
  .bottom-slider-label span { color: var(--accent); font-size: 11px; font-weight: 600; min-width: 36px; text-align: right; }
  .pot-badge {
    font-size: 7px; letter-spacing: 0.06em; text-transform: uppercase;
    background: color-mix(in srgb, var(--accent) 18%, transparent);
    color: var(--accent); border-radius: 4px; padding: 1px 4px; margin-left: 2px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .pot-badge.visible { opacity: 1; }

  .bottom-corner-color {
    align-self: stretch; margin: 2px 0 2px; padding: 14px 14px 12px;
    border-radius: 24px 0 0 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.20)), linear-gradient(135deg, rgba(255,255,255,0.22), rgba(255,255,255,0.06));
    border: 1px solid rgba(255,255,255,0.50); border-right: none; border-bottom: none;
    box-shadow: 0 1px 0 rgba(255,255,255,0.70) inset, 0 8px 24px rgba(90,70,50,0.08);
    display: flex; align-items: flex-end; justify-content: flex-end;
  }
  .color-pill { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  #bottom-color-preview {
    width: 54px; height: 54px; border-radius: 16px;

  }
  #bottom-color-text { font-size: 9px; color: var(--dim); font-family: 'Roboto Mono', monospace; white-space: nowrap; letter-spacing: 0.08em; text-transform: uppercase; }
  :root[data-theme="dark"] .bottom-corner-color {

    border-color: rgba(255,255,255,0.10); box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 10px 24px rgba(0,0,0,0.24);

  input[type="range"].big-slider {

  input[type="range"].big-slider::-webkit-slider-thumb {

<script>
// ── NOTE → HUE MAP (matches bridge.py) ──
const NOTE_HUE = {
  "C":  0,   "C#": 30,  "D":  60,  "D#": 90,
  "E":  120, "F":  150, "F#": 180, "G":  210,
  "G#": 240, "A":  270, "A#": 300, "B":  330,
};

// Piano layout: which notes are black keys
const PIANO_NOTES = [
  { note: "C",  black: false },
  { note: "C#", black: true  },
  { note: "D",  black: false },
  { note: "D#", black: true  },
  { note: "E",  black: false },
  { note: "F",  black: false },
  { note: "F#", black: true  },
  { note: "G",  black: false },
  { note: "G#", black: true  },
  { note: "A",  black: false },
  { note: "A#", black: true  },
  { note: "B",  black: false },
];

function noteToColor(note, sat=80, lit=60) {
  const h = NOTE_HUE[note];
  if (h === undefined) return '#ffffff';
  return `hsl(${h},${sat}%,${lit}%)`;
}

// Build piano strip
function buildPianoStrip() {
  const strip = document.getElementById('piano-strip');
  strip.innerHTML = '';
  for (const { note, black } of PIANO_NOTES) {
    const key = document.createElement('div');
    key.className = `pk ${black ? 'black-key' : 'white-key'}`;
    key.dataset.note = note;
    key.dataset.tip = note;
    const color = noteToColor(note, 80, black ? 40 : 65);
    key.style.background = color;
    strip.appendChild(key);
  }
}
buildPianoStrip();

// Highlight active note on piano strip
function highlightPianoNote(noteName) {
  document.querySelectorAll('.pk').forEach(k => k.classList.remove('active-note'));
  if (!noteName || noteName === '--') return;
  // Handle compound notes like "C+E"
  const parts = noteName.split('+');
  for (const part of parts) {
    const key = document.querySelector(`.pk[data-note="${part.trim()}"]`);
    if (key) key.classList.add('active-note');
  }
}

// ── CANVAS SETUP ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
const stage = document.getElementById('board-stage');

const WHITE_BOARD = '#fffef9';
const BLACK_BOARD = '#111111';
let canvasBg = WHITE_BOARD;

const strokes = [];
let activeStroke = null;

function redrawAll() {
  ctx.fillStyle = canvasBg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (const s of strokes) {
    if (s.points.length < 2) continue;
    ctx.strokeStyle = s.erase ? canvasBg : s.color;
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = s.alpha;
    ctx.lineWidth = s.size;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(s.points[0].x, s.points[0].y);
    for (let i = 1; i < s.points.length; i++) ctx.lineTo(s.points[i].x, s.points[i].y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

function resizeCanvas() {
  canvas.width  = stage.clientWidth  || wrap.clientWidth || window.innerWidth;
  canvas.height = stage.clientHeight || wrap.clientHeight || window.innerHeight;
  redrawAll();
}

// ── DRAWING STATE ──
let isDrawing = false, eraseMode = false, mouseMode = false, paused = false;
let hue = 207, sat = 80, lit = 50, opacity = 1.0;
let brushColor = '';
let brushSize = 5;
let sensitivity = 0.001, deadzone = 0;
let lastMoveTime = 0;
let micGain = 50;

// Pot override state
let pot1Active = false;
let pot2Active = false;

// Track whether mic is currently active
let micIsActive = false;

// ── MODE STATE ──
let currentMode = '--';

function setMode(mode) {
  currentMode = mode;
  const badge = document.getElementById('mode-badge');
  const label = document.getElementById('mode-label');
  badge.className = '';
  if (mode === 'solo') {

    badge.classList.add('duet');
    label.textContent = 'Duet';
  } else {
    label.textContent = '--';
  }
}

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h=0, s=0, l=(max+min)/2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max){
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
}

function applyMicColor(hex, incomingSat, incomingOpacity) {
  const { h, l } = hexToHsl(hex);
  hue = h;
  lit = l;

  // Update saturation and opacity from music message if provided
  if (typeof incomingSat === 'number') {
    sat = incomingSat;
    if (!pot1Active) {
      document.getElementById('sat-slider').value = sat;
    }
  }
  if (typeof incomingOpacity === 'number') {
    opacity = incomingOpacity;
    if (!pot2Active) {
      document.getElementById('opacity-slider').value = Math.round(opacity * 100);
    }
  }

  rebuildColor();
  // Sync hue slider visually
  document.getElementById('hue-slider').value = hue;
}

function revertToSilenceColor() {
  // When no music: use white stroke
  brushColor = `rgba(255,255,255,${opacity})`;
  // Keep sliders at their current values but update preview
  const previewColor = 'rgba(255,255,255,1)';
  document.getElementById('bottom-color-preview').style.background = previewColor;
  document.getElementById('bottom-color-text').textContent = '#FFFFFF';
}

function handleMicMessage(d) {
  const active = d.active === true;
  const color  = d.color  || null;
  const note   = d.note   || '--';
  const freq   = d.freq   || 0;
  const voices = d.voices || [];
  const incomingSat = typeof d.saturation === 'number' ? d.saturation : null;
  const incomingOpacity = typeof d.opacity === 'number' ? d.opacity : null;

  const strength = voices.length > 0 ? (parseFloat(voices[0].strength) || 100) : 100;
  const gateThreshold = 100 - micGain;

  micIsActive = active && color !== null && strength >= gateThreshold;

  updateMicUI(note, freq, color, micIsActive);
  highlightPianoNote(micIsActive ? note : null);

  if (micIsActive && color) {
    applyMicColor(color, incomingSat, incomingOpacity);
  } else {
    // No music — update sat/opacity from pot/message but set stroke to white
    if (incomingSat !== null && !pot1Active) {
      sat = incomingSat;
      document.getElementById('sat-slider').value = sat;
      document.getElementById('bottom-sat-display').textContent = Math.round(sat) + '%';
    }
    if (incomingOpacity !== null && !pot2Active) {
      opacity = incomingOpacity;
      document.getElementById('opacity-slider').value = Math.round(opacity * 100);
      document.getElementById('bottom-opacity-display').textContent = Math.round(opacity * 100) + '%';
    }
    revertToSilenceColor();
  }
}

function updateMicUI(note, freq, color, active) {
  const dot = document.getElementById('mic-dot');
  const noteEl = document.getElementById('mic-note-display');
  const freqEl = document.getElementById('mic-freq-display');
  const swatchEl = document.getElementById('mic-color-swatch');

  if (active && color) {
    dot.className = 'active';
    noteEl.textContent = note;
    noteEl.style.color = color;
    freqEl.textContent = freq + ' Hz';
    swatchEl.style.background = color;
  } else {
    dot.className = 'silence';
    noteEl.textContent = '--';
    noteEl.style.color = '';
    freqEl.textContent = freq > 0 ? freq + ' Hz' : '0 Hz';
    swatchEl.style.background = 'var(--border)';
  }
}

function handlePotMessage(d) {
  const mode = d.mode || '';
  const raw  = typeof d.pot === 'number' ? d.pot : null;
  if (raw === null) return;
  const pct = Math.round(Math.max(0, Math.min(4095, raw)) / 4095 * 100);

  if (mode === 'sat' || mode === 'saturation' || mode === 'pot1') {
    sat = pct;
    pot1Active = true;
    document.getElementById('sat-slider').value = pct;
    document.getElementById('sat-slider').classList.add('pot-locked');
    document.getElementById('pot1-badge').classList.add('visible');
    rebuildColor();
  } else if (mode === 'opacity' || mode === 'pot2') {
    opacity = pct / 100;
    pot2Active = true;
    document.getElementById('opacity-slider').value = pct;
    document.getElementById('opacity-slider').classList.add('pot-locked');
    document.getElementById('pot2-badge').classList.add('visible');
    rebuildColor();
  } else if (mode === 'gain' || mode === 'mic_gain' || mode === 'pot3') {
    micGain = pct;
  }
}

function rebuildColor() {
  if (!micIsActive) {
    // Silence = white stroke
    brushColor = `rgba(255,255,255,${opacity})`;
    document.getElementById('bottom-color-preview').style.background = 'rgba(255,255,255,1)';
    document.getElementById('bottom-color-text').textContent = '#FFFFFF';
  } else {
    brushColor = `hsla(${hue},${sat}%,${lit}%,${opacity})`;
    const previewColor = `hsl(${hue},${sat}%,${lit}%)`;
    document.getElementById('bottom-color-preview').style.background = previewColor;
    document.getElementById('bottom-color-text').textContent = previewColor.toUpperCase();
  }
  document.getElementById('opacity-slider').style.background =
    micIsActive
      ? `linear-gradient(to right, hsla(${hue},${sat}%,${lit}%,0.1), hsl(${hue},${sat}%,${lit}%))`
      : `linear-gradient(to right, rgba(255,255,255,0.1), rgba(255,255,255,0.9))`;
  document.getElementById('bottom-hue-display').textContent = hue + '°';
  document.getElementById('bottom-opacity-display').textContent = Math.round(opacity*100) + '%';
  document.getElementById('bottom-sat-display').textContent = Math.round(sat) + '%';
}

function updateSensitivityDash() {
  const slider = document.getElementById('overlay-sens-slider');
  const valueLabel = document.getElementById('sens-val');
  if (!slider || !valueLabel) return;
  slider.value = Math.max(1, Math.min(20, Math.round(sensitivity / 0.0005)));
  valueLabel.textContent = sensitivity.toFixed(4);
}

function applyBoardTransform() {
  document.documentElement.style.setProperty('--board-pan-x', `${boardPanX}px`);
  document.documentElement.style.setProperty('--board-pan-y', `${boardPanY}px`);
}
function clampBoardPan() {
  const vw = stage.clientWidth * (boardZoom < 1 ? boardZoom : 1);
  const vh = stage.clientHeight * (boardZoom < 1 ? boardZoom : 1);
  boardPanX = Math.max(vw >= wrap.clientWidth  ? wrap.clientWidth  - vw : 0, Math.min(vw >= wrap.clientWidth  ? 0 : wrap.clientWidth  - vw, boardPanX));
  boardPanY = Math.max(vh >= wrap.clientHeight ? wrap.clientHeight - vh : 0, Math.min(vh >= wrap.clientHeight ? 0 : wrap.clientHeight - vh, boardPanY));
  applyBoardTransform();
}
function setBoardZoom(nextZoom) {
  boardZoom = Math.max(0.5, Math.min(2, nextZoom));
  const pct = boardZoom < 1 ? (100 / (boardZoom * boardZoom)) : (100 * boardZoom);
  document.documentElement.style.setProperty('--board-width',  `${pct}%`);
  document.documentElement.style.setProperty('--board-height', `${pct}%`);
  document.documentElement.style.setProperty('--board-scale',  boardZoom < 1 ? String(boardZoom) : '1');
  document.getElementById('zoom-display').textContent = Math.round(boardZoom * 100) + '%';
  wrap.style.overflow = 'hidden';
  wrap.classList.toggle('pannable', !mouseMode);
  resizeCanvas();
  const vw = stage.clientWidth * (boardZoom < 1 ? boardZoom : 1);
  const vh = stage.clientHeight * (boardZoom < 1 ? boardZoom : 1);
  boardPanX = Math.min(0, (wrap.clientWidth  - vw) / 2);
  boardPanY = Math.min(0, (wrap.clientHeight - vh) / 2);
  clampBoardPan();
}

let paintingTimer = null;
function setPainting(active) {
  if (active) { document.body.classList.add('painting'); clearTimeout(paintingTimer); paintingTimer = null; }
  else {
    if (!paintingTimer) paintingTimer = setTimeout(() => { document.body.classList.remove('painting'); paintingTimer = null; }, 120);
  }
}

function drawTo(x, y) {
  if (eraseMode) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = brushSize * 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
    ctx.globalCompositeOperation = 'source-over';
    if (!activeStroke) activeStroke = { points: [{x:lastX, y:lastY}], color: canvasBg, size: brushSize*4, alpha:1, erase:true };
    activeStroke.points.push({x, y});
    lastX = x; lastY = y; isDrawing = true; return;
  }
  if (!isDrawing) {
    activeStroke = { points: [{x, y}], color: brushColor, size: brushSize, alpha: 1, erase: false };
    lastX = x; lastY = y; isDrawing = true; return;
  }
  setPainting(true);
  ctx.globalCompositeOperation = 'source-over';
  ctx.strokeStyle = brushColor; ctx.lineWidth = brushSize;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
  if (activeStroke) activeStroke.points.push({x, y});
  lastX = x; lastY = y;
}
function liftPen() {
  if (activeStroke && activeStroke.points.length > 1) strokes.push(activeStroke);
  activeStroke = null; isDrawing = false; lastX = posX; lastY = posY; ctx.beginPath(); setPainting(false);
}

function applyAccel(ax, ay) {
  if (pickingStart || paused) return;
  const adx = Math.abs(ax) > deadzone ? ax : 0;
  const ady = Math.abs(ay) > deadzone ? ay : 0;
  if (!adx && !ady) { if (Date.now() - lastMoveTime > 180) liftPen(); return; }
  lastMoveTime = Date.now();
  const MAX_STEP = 80;
  const stepX = Math.max(-MAX_STEP, Math.min(MAX_STEP, adx * sensitivity));
  const stepY = Math.max(-MAX_STEP, Math.min(MAX_STEP, ady * sensitivity));
  posX = Math.max(0, Math.min(canvas.width,  posX + stepX));
  posY = Math.max(0, Math.min(canvas.height, posY - stepY));
  drawTo(posX, posY); updateCursorRing(posX, posY);
}

// ── WEBSOCKET ──
let ws = null;
const WS_URL = 'ws://localhost:8765';
let wsManualClose = false;

function connectWS() {
  wsManualClose = false;
  if (ws) ws.close();
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    setStatus(true, 'Connected');
    posX = sessionStartX; posY = sessionStartY;
    lastX = posX; lastY = posY;
    liftPen(); showStartPicker();
  };
  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      const t = d.type;

      if (t === 'accel') {
        const ax = d.dx ?? d.ax ?? 0;
        const ay = d.dy ?? d.ay ?? 0;
        updateAccelUI(ax, ay);
        applyAccel(ax, ay);
        return;
      }

      if (t === 'music') {
        const voices = d.voices || [];
        if (voices.length === 0) {
          handleMicMessage({ active: false, color: null, note: '--', freq: 0, voices: [], saturation: d.saturation, opacity: d.opacity });
        } else {
          handleMicMessage({ active: true, color: d.color || null, note: d.note || voices[0].note, freq: d.freq || voices[0].freq || 0, voices, saturation: d.saturation, opacity: d.opacity });
        }
        return;
      }

      if (t === 'silence') {
        handleMicMessage({ active: false, color: null, note: '--', freq: 0, voices: [], saturation: d.saturation, opacity: d.opacity });
        return;
      }

      if (t === 'note') {
        handleMicMessage({ active: d.active, color: d.color, note: d.note, freq: d.freq, voices: [], saturation: d.saturation, opacity: d.opacity });
        return;
      }

      if (t === 'mode') {
        handlePotMessage(d);
        return;
      }

      if (t === 'session_mode') {
        const m = (d.mode || '').toLowerCase();
        if (m === 'solo' || m === 'duet') setMode(m);
        return;
      }

      if (t === 'status') {
        const s = d.status || '';
        const dot = document.getElementById('mic-dot');
        if (s === 'calibrating') {
          dot.className = 'calibrating';
          document.getElementById('mic-note-display').textContent = '···';
        } else if (s === 'ready') {
          dot.className = 'silence';
          document.getElementById('mic-note-display').textContent = '--';
        }
        return;
      }

    } catch(err) { /* ignore parse errors */ }
  };
  ws.onclose = () => { setStatus(false, wsManualClose ? 'Disconnected' : 'Disconnected'); ws = null; wsManualClose = false; setMode('--'); };
  ws.onerror = () => setStatus(false, 'Error');
}
function disconnectWS() {
  if (!ws) return; wsManualClose = true; ws.close();
}
function setStatus(ok, msg) {
  document.getElementById('status-dot').className = ok ? 'connected' : '';
  document.getElementById('status-text').textContent = msg;
  document.getElementById('esp32-connect-btn').classList.toggle('active', ok);
  document.getElementById('esp32-connect-btn').setAttribute('data-tip', ok ? 'Disconnect ESP32' : 'Connect ESP32');
  document.querySelectorAll('#session-sep, #pause-btn, #continue-btn').forEach(el => el.classList.toggle('session-only-hidden', !ok));
}
document.getElementById('esp32-connect-btn').addEventListener('click', () => {
  ws && ws.readyState === WebSocket.OPEN ? disconnectWS() : connectWS();
});

function updateAccelUI(ax, ay) {
  document.getElementById('ax-val').textContent = ax;
  document.getElementById('ay-val').textContent = ay;
  const M = 16384;
  const axP = Math.abs(ax)/M*50, axB = document.getElementById('ax-bar');
  axB.style.left = ax >= 0 ? '50%' : (50-axP)+'%'; axB.style.width = axP+'%';
  const ayP = Math.abs(ay)/M*50, ayB = document.getElementById('ay-bar');
  ayB.style.left = ay >= 0 ? '50%' : (50-ayP)+'%'; ayB.style.width = ayP+'%';
}

function updateCursorRing(x, y) {
  const ring = document.getElementById('cursor-ring');
  ring.style.left = x+'px'; ring.style.top = y+'px';
  const sz = (eraseMode ? brushSize*4 : brushSize)+6;
  ring.style.width = sz+'px'; ring.style.height = sz+'px';
}

let mouseDown = false, touchDrawing = false;
canvas.addEventListener('mousemove', (e) => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX-r.left)*(canvas.width/r.width), my = (e.clientY-r.top)*(canvas.height/r.height);
  updateCursorRing(mx, my);
  if (!pickingStart && mouseMode && mouseDown) { posX=mx; posY=my; isDrawing=true; drawTo(mx,my); }
});
canvas.addEventListener('mousedown', (e) => {
  if (pickingStart || !mouseMode) return;

  const r = canvas.getBoundingClientRect();
  posX=(e.clientX-r.left)*(canvas.width/r.width); posY=(e.clientY-r.top)*(canvas.height/r.height);
  isDrawing=false; drawTo(posX,posY);
});

canvas.addEventListener('mouseleave', () => { mouseDown=false; liftPen(); });
canvas.addEventListener('touchstart', (e) => {
  if (pickingStart || !mouseMode) return;
  const t=e.touches[0]; if(!t) return; touchDrawing=true;
  const r=canvas.getBoundingClientRect();
  posX=(t.clientX-r.left)*(canvas.width/r.width); posY=(t.clientY-r.top)*(canvas.height/r.height);
  updateCursorRing(posX,posY); isDrawing=false; drawTo(posX,posY); e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchmove', (e) => {
  const t=e.touches[0]; if(!t) return;
  const r=canvas.getBoundingClientRect();
  const mx=(t.clientX-r.left)*(canvas.width/r.width), my=(t.clientY-r.top)*(canvas.height/r.height);
  updateCursorRing(mx,my);
  if (!pickingStart && mouseMode && touchDrawing) { posX=mx; posY=my; isDrawing=true; drawTo(mx,my); }
  e.preventDefault();
}, {passive:false});

    toolbar.style.bottom='auto'; toolbar.style.left=r.left+'px'; toolbar.style.top=r.top+'px'; e.preventDefault();
  },{passive:false});
  document.addEventListener('touchmove',(e)=>{ const t=e.touches[0]; if(t&&dragging){ toolbar.style.left=(t.clientX-ox)+'px'; toolbar.style.top=(t.clientY-oy)+'px'; } },{passive:false});
  document.addEventListener('touchend',()=>{ dragging=false; });
})();

// ── SENSOR PANEL COLLAPSE (right side) ──
const sensorPanel = document.getElementById('sensor-panel');
const sensorFab = document.getElementById('sensor-fab');
document.getElementById('sensor-close').addEventListener('click', () => {
  sensorPanel.classList.add('collapsed');
  sensorFab.classList.add('visible');
});
sensorFab.addEventListener('click', () => {
  sensorPanel.classList.remove('collapsed');
  sensorFab.classList.remove('visible');
});

// draggable sensor panel
(function(){
  const handle = document.getElementById('sensor-panel-header');
  let dragging=false, ox=0, oy=0;
  handle.addEventListener('mousedown',(e)=>{
    if(e.target.closest('.sensor-close'))return; dragging=true;
    const r=sensorPanel.getBoundingClientRect(); ox=e.clientX-r.left; oy=e.clientY-r.top;
    sensorPanel.style.right='auto'; sensorPanel.style.top='auto';
    sensorPanel.style.left=r.left+'px'; sensorPanel.style.top=r.top+'px'; e.preventDefault();
  });
  document.addEventListener('mousemove',(e)=>{ if(!dragging)return; sensorPanel.style.left=(e.clientX-ox)+'px'; sensorPanel.style.top=(e.clientY-oy)+'px'; });
  document.addEventListener('mouseup',()=>{ dragging=false; });
  handle.addEventListener('touchstart',(e)=>{
    if(e.target.closest('.sensor-close'))return; dragging=true;
    const t=e.touches[0]; const r=sensorPanel.getBoundingClientRect(); ox=t.clientX-r.left; oy=t.clientY-r.top;
    sensorPanel.style.right='auto'; sensorPanel.style.top='auto';
    sensorPanel.style.left=r.left+'px'; sensorPanel.style.top=r.top+'px'; e.preventDefault();
  },{passive:false});
  document.addEventListener('touchmove',(e)=>{ if(!dragging)return; const t=e.touches[0]; sensorPanel.style.left=(t.clientX-ox)+'px'; sensorPanel.style.top=(t.clientY-oy)+'px'; },{passive:false});
  document.addEventListener('touchend',()=>{ dragging=false; });
})();

// ── ZOOM ──
document.getElementById('zoom-out-btn').addEventListener('click', () => setBoardZoom(boardZoom-0.1));
document.getElementById('zoom-in-btn').addEventListener('click',  () => setBoardZoom(boardZoom+0.1));

// canvas panning
(function(){
  let panning=false, sx=0, sy=0, spx=0, spy=0;
  const beginPan=(cx,cy)=>{ if(mouseMode||pickingStart)return; panning=true; sx=cx; sy=cy; spx=boardPanX; spy=boardPanY; wrap.classList.add('panning'); };
  const movePan=(cx,cy)=>{ if(!panning)return; boardPanX=spx+(cx-sx); boardPanY=spy+(cy-sy); clampBoardPan(); };
  const endPan=()=>{ panning=false; wrap.classList.remove('panning'); };
  wrap.addEventListener('mousedown',(e)=>{ if(e.target.closest('button')||e.target.closest('#start-overlay'))return; beginPan(e.clientX,e.clientY); });
  document.addEventListener('mousemove',(e)=>movePan(e.clientX,e.clientY));
  document.addEventListener('mouseup',endPan);
  wrap.addEventListener('touchstart',(e)=>{ if(e.target.closest('button')||e.target.closest('#start-overlay'))return; const t=e.touches[0]; if(!t)return; beginPan(t.clientX,t.clientY); },{passive:true});
  document.addEventListener('touchmove',(e)=>{ const t=e.touches[0]; if(t)movePan(t.clientX,t.clientY); },{passive:true});
  document.addEventListener('touchend',endPan);
  wrap.addEventListener('wheel',(e)=>{ if(mouseMode||pickingStart)return; boardPanX-=e.deltaX; boardPanY-=e.deltaY; clampBoardPan(); e.preventDefault(); },{passive:false});
})();

// ── BOTTOM SLIDERS ──
document.getElementById('hue-slider').addEventListener('input', e => {
  hue = +e.target.value;
  rebuildColor(); liftPen();
});
document.getElementById('opacity-slider').addEventListener('input', e => {
  if (pot2Active) return;
  opacity = +e.target.value / 100;
  rebuildColor(); liftPen();
});
document.getElementById('sat-slider').addEventListener('input', e => {
  if (pot1Active) return;
  sat = +e.target.value;
  rebuildColor(); liftPen();
});

// overlay sliders
document.getElementById('overlay-sens-slider').addEventListener('input', e => {
  sensitivity=+e.target.value*0.0005; updateSensitivityDash();
});
document.getElementById('overlay-dead-slider').addEventListener('input', e => {
  deadzone=+e.target.value; document.getElementById('dead-val').textContent=deadzone;
});

// ── BRUSH SIZE SLIDER (toolbar) ──
document.getElementById('toolbar-size-slider').addEventListener('input', e => {
  brushSize = +e.target.value;
  document.getElementById('toolbar-size-val').textContent = brushSize;
  updateCursorRing(posX, posY);
});

// ── THEME ──
const themeSvg=document.getElementById('theme-svg');
const MOON=`<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
const SUN=`<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
themeSvg.innerHTML=document.documentElement.getAttribute('data-theme')==='dark'?SUN:MOON;

function applyBoardColor(bg) {
  canvasBg=bg; wrap.style.background=bg; stage.style.background=bg;
  stage.classList.toggle('blackboard', bg===BLACK_BOARD); redrawAll();
}
applyBoardColor(document.documentElement.getAttribute('data-theme')==='dark'?BLACK_BOARD:WHITE_BOARD);

document.getElementById('theme-btn').addEventListener('click', () => {
  const html=document.documentElement, wasDark=html.getAttribute('data-theme')==='dark';
  const newTheme=wasDark?'light':'dark';
  html.setAttribute('data-theme',newTheme); localStorage.setItem('tbd-theme',newTheme);
  themeSvg.innerHTML=wasDark?MOON:SUN;
  applyBoardColor(wasDark?WHITE_BOARD:BLACK_BOARD);
});

// ── INIT ──
rebuildColor();
updateSensitivityDash();
setBoardZoom(1);
hideStartPicker();
// Start with silence color (white)
revertToSilenceColor();
</script>
</body>
</html>
